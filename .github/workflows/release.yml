name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.2.3 or v1.2.3-alpha.1). Builds from the commit at this tag and creates a GitHub Release with the same name.'
        required: true
        type: string

permissions: {}

env:
  CARGO_TERM_COLOR: always
  RELEASE_TAG: ${{ github.event.inputs.tag }}

jobs:
  verify-release-input:
    name: Verify Release Input
    runs-on: ubuntu-latest
    permissions:
      checks: read
      contents: read
    outputs:
      tag: ${{ steps.verify.outputs.tag }}
      target_sha: ${{ steps.verify.outputs.target_sha }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Verify tag, signature, ancestry, and CI
        id: verify
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          TAG: ${{ env.RELEASE_TAG }}
        run: |
          set -euo pipefail

          if ! [[ "${TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z][0-9A-Za-z.-]*)?$ ]]; then
            echo "::error::Tag must match vX.Y.Z or vX.Y.Z-prerelease"
            exit 1
          fi

          ref_json="$(gh api "repos/${REPO}/git/ref/tags/${TAG}")"
          ref_type="$(jq -r '.object.type' <<<"${ref_json}")"
          ref_sha="$(jq -r '.object.sha' <<<"${ref_json}")"

          if [ "${ref_type}" != "tag" ]; then
            echo "::error::Lightweight tags are not accepted for releases"
            exit 1
          fi

          tag_json="$(gh api "repos/${REPO}/git/tags/${ref_sha}")"
          target_type="$(jq -r '.object.type' <<<"${tag_json}")"
          target_sha="$(jq -r '.object.sha' <<<"${tag_json}")"
          verified="$(jq -r '.verification.verified' <<<"${tag_json}")"

          if [ "${target_type}" != "commit" ]; then
            echo "::error::Release tag must point to a commit"
            exit 1
          fi

          if [ "${verified}" != "true" ]; then
            echo "::error::Release tag signature is not verified by GitHub"
            exit 1
          fi

          git fetch origin main --tags
          if ! git merge-base --is-ancestor "${target_sha}" origin/main; then
            echo "::error::Release tag target is not reachable from origin/main"
            exit 1
          fi

          checks_json="$(gh api "repos/${REPO}/commits/${target_sha}/check-runs?per_page=100")"
          for check_name in Format Clippy Test; do
            conclusion="$(
              jq -r --arg name "${check_name}" '
                [
                  .check_runs[]
                  | select(.name == $name and .app.slug == "github-actions")
                  | .conclusion
                ]
                | if any(. == "success") then "success" else "missing_or_failed" end
              ' <<<"${checks_json}"
            )"

            if [ "${conclusion}" != "success" ]; then
              echo "::error::Required check ${check_name} is not successful on ${target_sha}"
              exit 1
            fi
          done

          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"
          echo "target_sha=${target_sha}" >> "${GITHUB_OUTPUT}"

  build:
    name: Build (${{ matrix.target }})
    needs: verify-release-input
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            use_cross: false
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            use_cross: false
            musl: true
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            use_cross: true
          - target: aarch64-apple-darwin
            runner: macos-latest
            use_cross: false

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.verify-release-input.outputs.tag }}

      - name: Install pinned Rust toolchain
        run: rustup toolchain install 1.95.0 --profile minimal --no-self-update --target ${{ matrix.target }}

      - name: Install musl-tools
        if: matrix.musl
        run: sudo apt-get install -y musl-tools

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --version 0.2.5 --locked

      - name: Build (native)
        if: "!matrix.use_cross"
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.use_cross
        run: cross build --release --locked --target ${{ matrix.target }}

      - name: Create archive
        shell: bash
        env:
          TAG: ${{ needs.verify-release-input.outputs.tag }}
          TARGET: ${{ matrix.target }}
        run: |
          ARCHIVE="secretenv-${TAG}-${TARGET}.tar.gz"
          cp "target/${TARGET}/release/secretenv" ./secretenv
          tar czf "${ARCHIVE}" secretenv LICENSE NOTICE
          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: secretenv-${{ matrix.target }}
          path: ${{ env.ARCHIVE }}

  release:
    name: Publish Release
    needs:
      - build
      - verify-release-input
    runs-on: ubuntu-latest
    environment: release-publish
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.verify-release-input.outputs.tag }}

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate SHA256SUMS
        run: |
          cd artifacts
          sha256sum secretenv-*.tar.gz > SHA256SUMS
          cat SHA256SUMS

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          tag_name: ${{ needs.verify-release-input.outputs.tag }}
          files: |
            artifacts/secretenv-*.tar.gz
            artifacts/SHA256SUMS
          generate_release_notes: true

  update-homebrew-tap:
    name: Update Homebrew Tap
    needs:
      - release
      - verify-release-input
    runs-on: ubuntu-latest
    environment: homebrew-tap
    permissions: {}
    env:
      TAG: ${{ needs.verify-release-input.outputs.tag }}
    steps:
      - name: Download SHA256SUMS
        run: |
          sleep 10
          curl -fsSL \
            "https://github.com/ebisawa/secretenv/releases/download/${TAG}/SHA256SUMS" \
            -o SHA256SUMS
          cat SHA256SUMS

      - name: Extract hashes
        run: |
          SHA256_LINUX_X86="$(grep "x86_64-unknown-linux-gnu" SHA256SUMS | awk '{print $1}')"
          SHA256_LINUX_ARM="$(grep "aarch64-unknown-linux-gnu" SHA256SUMS | awk '{print $1}')"
          SHA256_MACOS_ARM="$(grep "aarch64-apple-darwin" SHA256SUMS | awk '{print $1}')"
          echo "SHA256_LINUX_X86=${SHA256_LINUX_X86}" >> "$GITHUB_ENV"
          echo "SHA256_LINUX_ARM=${SHA256_LINUX_ARM}" >> "$GITHUB_ENV"
          echo "SHA256_MACOS_ARM=${SHA256_MACOS_ARM}" >> "$GITHUB_ENV"

      - name: Update Formula
        uses: actions/github-script@v8
        env:
          TAG: ${{ needs.verify-release-input.outputs.tag }}
          SHA256_LINUX_X86: ${{ env.SHA256_LINUX_X86 }}
          SHA256_LINUX_ARM: ${{ env.SHA256_LINUX_ARM }}
          SHA256_MACOS_ARM: ${{ env.SHA256_MACOS_ARM }}
        with:
          github-token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          script: |
            const tag = process.env.TAG;
            const ver = tag.replace(/^v/, '');
            const base = `https://github.com/ebisawa/secretenv/releases/download/${tag}`;

            const formula = `# typed: false
            # frozen_string_literal: true

            class Secretenv < Formula
              desc "Serverless CLI for secure secret sharing with HPKE encryption"
              homepage "https://github.com/ebisawa/secretenv"
              version "${ver}"
              license "Apache-2.0"

              on_macos do
                on_arm do
                  url "${base}/secretenv-${tag}-aarch64-apple-darwin.tar.gz"
                  sha256 "${process.env.SHA256_MACOS_ARM}"
                end
              end

              on_linux do
                on_intel do
                  url "${base}/secretenv-${tag}-x86_64-unknown-linux-gnu.tar.gz"
                  sha256 "${process.env.SHA256_LINUX_X86}"
                end
                on_arm do
                  url "${base}/secretenv-${tag}-aarch64-unknown-linux-gnu.tar.gz"
                  sha256 "${process.env.SHA256_LINUX_ARM}"
                end
              end

              def install
                bin.install "secretenv"
              end

              test do
                assert_match version.to_s, shell_output("#{bin}/secretenv --version")
              end
            end
            `;

            const { data: file } = await github.rest.repos.getContent({
              owner: "ebisawa",
              repo: "homebrew-secretenv",
              path: "Formula/secretenv.rb",
            }).catch(() => ({ data: null }));

            await github.rest.repos.createOrUpdateFileContents({
              owner: "ebisawa",
              repo: "homebrew-secretenv",
              path: "Formula/secretenv.rb",
              message: `Update secretenv to ${tag}`,
              content: Buffer.from(formula).toString("base64"),
              sha: file?.sha,
            });
